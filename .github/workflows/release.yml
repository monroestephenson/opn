name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux' && matrix.cross == false
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="opn-${VERSION}-${TARGET}.tar.gz"
          mkdir -p staging
          cp target/${TARGET}/release/opn staging/
          cd staging
          tar czf "../${ARCHIVE}" opn
          cd ..
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opn-${{ matrix.target }}
          path: |
            opn-*.tar.gz
            opn-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            opn-*.tar.gz
            opn-*.tar.gz.sha256

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Prepare version and source SHA256
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TARBALL_URL="https://github.com/monroestephenson/opn/archive/refs/tags/${TAG}.tar.gz"
          SHA256="$(curl -sL "${TARBALL_URL}" | shasum -a 256 | awk '{print $1}')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: monroestephenson/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update Formula/opn.rb
        shell: bash
        run: |
          set -euo pipefail
          FORMULA="tap/Formula/opn.rb"
          TAG="${{ steps.vars.outputs.tag }}"
          VERSION="${{ steps.vars.outputs.version }}"
          SHA="${{ steps.vars.outputs.sha256 }}"

          sed -i.bak -E "s|url \".*\"|url \"https://github.com/monroestephenson/opn/archive/refs/tags/${TAG}.tar.gz\"|" "$FORMULA"
          sed -i.bak -E "s|sha256 \".*\"|sha256 \"${SHA}\"|" "$FORMULA"
          if grep -q '^[[:space:]]*version "' "$FORMULA"; then
            sed -i.bak -E "s|version \".*\"|version \"${VERSION}\"|" "$FORMULA"
          else
            awk -v v="$VERSION" '
              { print }
              /url "/ && !done { print "  version \"" v "\""; done=1 }
            ' "$FORMULA" > "${FORMULA}.tmp"
            mv "${FORMULA}.tmp" "$FORMULA"
          fi
          rm -f "${FORMULA}.bak"

      - name: Commit and push tap update
        shell: bash
        working-directory: tap
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No tap changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/opn.rb
          git commit -m "Update opn to v${{ steps.vars.outputs.version }}"
          git push origin HEAD:main

  update-aur:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version and checksums
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Download the pre-computed .sha256 files uploaded with the release
          SHA_X86=$(curl -sL "https://github.com/monroestephenson/opn/releases/download/${TAG}/opn-${TAG}-x86_64-unknown-linux-gnu.tar.gz.sha256" | awk '{print $1}')
          SHA_AARCH64=$(curl -sL "https://github.com/monroestephenson/opn/releases/download/${TAG}/opn-${TAG}-aarch64-unknown-linux-gnu.tar.gz.sha256" | awk '{print $1}')

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "sha_x86=${SHA_X86}" >> "$GITHUB_OUTPUT"
          echo "sha_aarch64=${SHA_AARCH64}" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.version }}"
          SHA_X86="${{ steps.vars.outputs.sha_x86 }}"
          SHA_AARCH64="${{ steps.vars.outputs.sha_aarch64 }}"

          sed -i "s/^pkgver=.*/pkgver=${VERSION}/"                    aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/"                             aur/PKGBUILD
          sed -i "s/'PLACEHOLDER_X86_64'/'${SHA_X86}'/"               aur/PKGBUILD
          sed -i "s/'PLACEHOLDER_AARCH64'/'${SHA_AARCH64}'/"          aur/PKGBUILD

      - name: Generate .SRCINFO
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.version }}"
          SHA_X86="${{ steps.vars.outputs.sha_x86 }}"
          SHA_AARCH64="${{ steps.vars.outputs.sha_aarch64 }}"

          # .SRCINFO must have no leading whitespace — build it with printf
          {
            printf 'pkgbase = opn-bin\n'
            printf '\tpkgdesc = See what'\''s using your ports and files\n'
            printf '\tpkgver = %s\n'   "${VERSION}"
            printf '\tpkgrel = 1\n'
            printf '\turl = https://github.com/monroestephenson/opn\n'
            printf '\tarch = x86_64\n'
            printf '\tarch = aarch64\n'
            printf '\tlicense = MIT\n'
            printf '\tprovides = opn\n'
            printf '\tconflicts = opn\n'
            printf '\tsource_x86_64 = opn-v%s-x86_64.tar.gz::https://github.com/monroestephenson/opn/releases/download/v%s/opn-v%s-x86_64-unknown-linux-gnu.tar.gz\n' "${VERSION}" "${VERSION}" "${VERSION}"
            printf '\tsha256sums_x86_64 = %s\n' "${SHA_X86}"
            printf '\tsource_aarch64 = opn-v%s-aarch64.tar.gz::https://github.com/monroestephenson/opn/releases/download/v%s/opn-v%s-aarch64-unknown-linux-gnu.tar.gz\n' "${VERSION}" "${VERSION}" "${VERSION}"
            printf '\tsha256sums_aarch64 = %s\n' "${SHA_AARCH64}"
            printf '\n'
            printf 'pkgname = opn-bin\n'
          } > aur/.SRCINFO

      - name: Set up SSH for AUR
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur
          EOF

      - name: Push to AUR
        shell: bash
        run: |
          set -euo pipefail
          git clone ssh://aur@aur.archlinux.org/opn-bin.git aur-repo
          cp aur/PKGBUILD aur/.SRCINFO aur-repo/
          cd aur-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No AUR changes to commit."
            exit 0
          fi
          git add PKGBUILD .SRCINFO
          git commit -m "Update opn-bin to v${{ steps.vars.outputs.version }}"
          git push

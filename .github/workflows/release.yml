name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux' && matrix.cross == false
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="opn-${VERSION}-${TARGET}.tar.gz"
          mkdir -p staging
          cp target/${TARGET}/release/opn staging/
          cd staging
          tar czf "../${ARCHIVE}" opn
          cd ..
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opn-${{ matrix.target }}
          path: |
            opn-*.tar.gz
            opn-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            opn-*.tar.gz
            opn-*.tar.gz.sha256

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Prepare version and source SHA256
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TARBALL_URL="https://github.com/monroestephenson/opn/archive/refs/tags/${TAG}.tar.gz"
          SHA256="$(curl -sL "${TARBALL_URL}" | shasum -a 256 | awk '{print $1}')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: monroestephenson/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update Formula/opn.rb
        shell: bash
        run: |
          set -euo pipefail
          FORMULA="tap/Formula/opn.rb"
          TAG="${{ steps.vars.outputs.tag }}"
          VERSION="${{ steps.vars.outputs.version }}"
          SHA="${{ steps.vars.outputs.sha256 }}"

          sed -i.bak -E "s|url \".*\"|url \"https://github.com/monroestephenson/opn/archive/refs/tags/${TAG}.tar.gz\"|" "$FORMULA"
          sed -i.bak -E "s|sha256 \".*\"|sha256 \"${SHA}\"|" "$FORMULA"
          if grep -q '^[[:space:]]*version "' "$FORMULA"; then
            sed -i.bak -E "s|version \".*\"|version \"${VERSION}\"|" "$FORMULA"
          else
            awk -v v="$VERSION" '
              { print }
              /url "/ && !done { print "  version \"" v "\""; done=1 }
            ' "$FORMULA" > "${FORMULA}.tmp"
            mv "${FORMULA}.tmp" "$FORMULA"
          fi
          rm -f "${FORMULA}.bak"

      - name: Commit and push tap update
        shell: bash
        working-directory: tap
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No tap changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/opn.rb
          git commit -m "Update opn to v${{ steps.vars.outputs.version }}"
          git push origin HEAD:main
